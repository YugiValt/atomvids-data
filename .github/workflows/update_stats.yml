name: Update Video Stats
on:
  repository_dispatch:
    types: [update_likes]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update Stats
        run: |
          node -e "
          const fs = require('fs');
          const stats = JSON.parse(fs.readFileSync('stats.json'));
          const type = '${{ github.event.event_type }}';
          const payload = ${{ toJson(github.event.client_payload) }};

          if (type === 'register_user') {
            // Save the new username and password
            stats.users.push({ username: payload.username, password: payload.password });
          } else if (type === 'update_likes') {
            if(!stats.videos[payload.video_id]) stats.videos[payload.video_id] = { likes: 0 };
            stats.videos[payload.video_id].likes += 1;
          } else if (type === 'update_subscribers') {
            stats.subscribers += 1;
          }
          
          fs.writeFileSync('stats.json', JSON.stringify(stats, null, 2));
          "
